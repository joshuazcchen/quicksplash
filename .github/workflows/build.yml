name: build_executable

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: Compile
      run: make test

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}
        path: |
          client
          server
